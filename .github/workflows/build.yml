name: Release
on:
    push:
        branches:
            - main

env:
    FORCE_COLOR: true
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    REPO: Equicord/Equibored
    USERNAME: GitHub-Actions

permissions:
    contents: write

jobs:
    Build:
        name: Build Pixelcord
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Publish desktop build to the latest release
              if: ${{ vars.ACT == 'false' }}
              run: |
                  # The installer CLI (Pixelotl) reads /releases/latest and downloads
                  # desktop.asar, so upload the fresh build to whatever the latest release is.
                  # (On a version bump, publish.yml makes a new release become "latest"; if this
                  # ever races and uploads to the previous tag, just re-push to refresh it.)
                  tag=$(gh release view --json tagName --jq .tagName)
                  echo "Uploading build to release $tag"
                  gh release upload "$tag" --clobber \
                      dist/desktop.asar dist/pixeltop.asar \
                      dist/plugins.json dist/equicordplugins.json dist/vencordplugins.json dist/devs.json

            - name: Upload Plugin JSONs to Equibored repo
              if: github.repository == 'Equicord/Equicord' && vars.ACT == 'false'
              run: |
                  git config --global user.name "GitHub-Actions"
                  git config --global user.email actions@github.com
                  git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$REPO.git plugins
                  cd plugins

                  cp ../dist/release/*plugins.json .
                  cp ../dist/release/devs.json .
                  git add -A

                  git commit -m "Plugins for https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA"
                  git push --force https://$USERNAME:$GITHUB_TOKEN@github.com/$REPO.git
